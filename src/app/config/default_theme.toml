fg = "#DDDCCC"

[theme.scrollbar]
show_ends = false

[theme.scrollbar.ends]
bg = "#7c7755"
fg = "#373424"

[theme.scrollbar.thumb]
bg = "#373424"
fg = "#9C9977"

[theme.scrollbar.track]
fg = "#7c7755"

[theme.status.detail]
