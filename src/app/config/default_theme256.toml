# 256 color theme for terminals that don't support true color
# All colors use decimal 256-color indexes (emitted as 38;5;n / 48;5;n)
# to ensure compatibility with terminals like Terminal.app that don't support truecolor.
bg = "234" # #1c1c1c - near black
fg = "252" # #d0d0d0 - light gray
modifiers = []

[alert]
bg = ""
fg = "244" # #808080 - gray
modifiers = []

[alert.error]
bg = ""
fg = "160" # #d70000 - red
modifiers = ["bold"]

[alert.info]
bg = ""
fg = "114" # #87d787 - green
modifiers = ["bold"]

[alert.warn]
bg = ""
fg = "173" # #d7875f - orange
modifiers = ["bold"]

[breadcrumbs]
bg = "234" # #1c1c1c
fg = "44" # #00d7d7 - cyan
modifiers = []

[breadcrumbs.ancestor]
