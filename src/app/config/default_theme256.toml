[file_type]
# Whether to apply colors defined in the $LS_COLORS environment variable (if set) on top of colors configured in this section
ls_colors_take_precedence = true

# Classic dircolors defaults: fi=00, di=01;34, ln=01;36, ex=01;32, etc.
[file_type.block_device]
bg = "16" # #000000 - black (bd=40;33;01)
fg = "136" # #af8700 - yellow
modifiers = ["bold"]

[file_type.character_device]
bg = "16" # #000000 - black (cd=40;33;01)
fg = "136" # #af8700 - yellow
modifiers = ["bold"]

[file_type.directory]
bg = ""
fg = "33" # #0087ff - blue (di=01;34)
modifiers = ["bold"]

[file_type.directory_other_writable]
bg = "28" # #008700 - green (ow=34;42)
fg = "33" # #0087ff - blue
modifiers = []

[file_type.directory_sticky]
bg = "26" # #005fd7 - blue (st=37;44)
fg = "231" # #ffffff - white
modifiers = []

[file_type.directory_sticky_other_writable]
bg = "28" # #008700 - green (tw=30;42)
fg = "234" # #1c1c1c
modifiers = []

[file_type.door]
bg = ""
fg = "127" # #af00af - magenta (do=01;35)
modifiers = ["bold"]

[file_type.executable]
