[theme256]
# 256 color theme for terminals that don't support true color
# All colors use decimal 256-color indexes (emitted as 38;5;n / 48;5;n)
# to ensure compatibility with terminals like Terminal.app that don't support truecolor.
bg = "234" # #1c1c1c - near black
fg = "252" # #d0d0d0 - light gray

[theme256.alert]
fg = "244" # #808080 - gray

[theme256.alert.error]
fg = "160" # #d70000 - red
modifiers = ["bold"]

[theme256.alert.info]
fg = "114" # #87d787 - green
modifiers = ["bold"]

[theme256.alert.warn]
fg = "173" # #d7875f - orange
modifiers = ["bold"]

[theme256.breadcrumbs]
bg = "234" # #1c1c1c
fg = "44" # #00d7d7 - cyan

[theme256.breadcrumbs.ancestor]
bg = "234" # #1c1c1c
fg = "44" # #00d7d7 - cyan

[theme256.breadcrumbs.basename]
bg = "26" # #005fd7 - blue
fg = "231" # #ffffff - white
modifiers = ["bold"]

[theme256.breadcrumbs.separator]
bg = "234" # #1c1c1c
fg = "240" # #585858 - dim gray

[theme256.file_modified_date.greater_than_year]
fg = "160" # #d70000 - red

[theme256.file_modified_date.less_than_day]
fg = "120" # #87ff87 - green

[theme256.file_modified_date.less_than_hour]
fg = "44" # #00d7d7 - cyan

[theme256.file_modified_date.less_than_minute]
fg = "117" # #87d7ff - sky blue

[theme256.file_modified_date.less_than_month]
fg = "184" # #d7d700 - yellow

[theme256.file_modified_date.less_than_year]
fg = "164" # #d700d7 - magenta

[theme256.file_size.bytes]
fg = "244" # #808080 - gray

[theme256.file_size.gib]
fg = "178" # #d7af00 - amber

[theme256.file_size.kib]
fg = "36" # #00af87 - teal

[theme256.file_size.mib]
fg = "44" # #00d7d7 - cyan

[theme256.file_size.pib]
fg = "160" # #d70000 - red

[theme256.file_size.tib]
fg = "166" # #d75f00 - orange

[theme256.file_type]
# Whether to apply colors defined in the $LS_COLORS environment variable (if set) on top of colors configured in this section
ls_colors_take_precedence = true

# Classic dircolors defaults: fi=00, di=01;34, ln=01;36, ex=01;32, etc.
[theme256.file_type.block_device]
bg = "16" # #000000 - black (bd=40;33;01)
fg = "136" # #af8700 - yellow
modifiers = ["bold"]

[theme256.file_type.character_device]
bg = "16" # #000000 - black (cd=40;33;01)
fg = "136" # #af8700 - yellow
modifiers = ["bold"]

[theme256.file_type.directory]
fg = "33" # #0087ff - blue (di=01;34)
modifiers = ["bold"]

[theme256.file_type.directory_other_writable]
bg = "28" # #008700 - green (ow=34;42)
fg = "33" # #0087ff - blue

[theme256.file_type.directory_sticky]
bg = "26" # #005fd7 - blue (st=37;44)
fg = "231" # #ffffff - white

[theme256.file_type.directory_sticky_other_writable]
bg = "28" # #008700 - green (tw=30;42)
fg = "234" # #1c1c1c

[theme256.file_type.door]
fg = "127" # #af00af - magenta (do=01;35)
modifiers = ["bold"]

[theme256.file_type.executable]
fg = "64" # #5f8700 - green (ex=01;32)
modifiers = ["bold"]

[theme256.file_type.missing]

[theme256.file_type.normal_file]

[theme256.file_type.pipe]
bg = "16" # #000000 - black (pi=40;33)
fg = "136" # #af8700 - yellow

[theme256.file_type.regular_file]

[theme256.file_type.setgid]
bg = "142" # #afaf00 - yellow (sg=30;43)
fg = "234" # #1c1c1c

[theme256.file_type.setuid]
bg = "88" # #870000 - red (su=37;41)
fg = "231" # #ffffff - white

[theme256.file_type.socket]
fg = "127" # #af00af - magenta (so=01;35)
modifiers = ["bold"]

[theme256.file_type.symlink]
fg = "37" # #00afaf - cyan (ln=01;36)
modifiers = ["bold"]

[theme256.file_type.symlink_broken]
bg = "16" # #000000 - black (or=40;31;01)
fg = "160" # #d70000 - red
modifiers = ["bold"]

[theme256.help]
bg = "234" # #1c1c1c
fg = "240" # #585858 - dim gray

[theme256.help.header]
bg = "26" # #005fd7 - blue
fg = "231" # #ffffff - white
modifiers = ["bold"]

[theme256.help.actions]
fg = "252" # #d0d0d0 - light gray
modifiers = ["bold"]

[theme256.help.shortcuts]
fg = "252" # #d0d0d0 - light gray

[theme256.clipboard.copy]
bg = "100" # #878700 - olive green
fg = "234" # #1c1c1c

[theme256.clipboard.cut]
bg = "166" # #d75f00 - orange red
fg = "234" # #1c1c1c

[theme256.clipboard.delete]
bg = "136" # #af8700 - amber
fg = "234" # #1c1c1c

[theme256.notice.filter]
bg = "28" # #008700 - green
fg = "234" # #1c1c1c

[theme256.notice.progress]
bg = "26" # #005fd7 - blue
fg = "44" # #00d7d7 - cyan

[theme256.prompt.cursor]
bg = "30" # #008787 - teal
fg = "234" # #1c1c1c

[theme256.prompt.input]
bg = "234" # #1c1c1c
fg = "252" # #d0d0d0

[theme256.prompt.label]
bg = "30" # #008787 - teal
fg = "234" # #1c1c1c

[theme256.prompt.selected]
bg = "26" # #005fd7 - blue
fg = "231" # #ffffff - white

[theme256.scrollbar]
show_ends = true

[theme256.scrollbar.ends]
bg = "18" # #000087
fg = "234" # #1c1c1c

[theme256.scrollbar.thumb]
bg = "234" # #1c1c1c
fg = "26" # #005fd7 - blue

[theme256.scrollbar.track]
bg = "235" # #262626
fg = "18" # #000087

[theme256.status.detail]
bg = "30" # #008787 - teal
fg = "234" # #1c1c1c

[theme256.status.label]
bg = "26" # #005fd7 - blue
fg = "231" # #ffffff - white

[theme256.table.body]
bg = "234" # #1c1c1c
fg = "252" # #d0d0d0

[theme256.table.delete]
bg = "136" # #af8700 - amber
fg = "234" # #1c1c1c

[theme256.table.header]
bg = "18" # #000087 - dark blue
fg = "252" # #d0d0d0

[theme256.table.header_sorted]
bg = "26" # #005fd7 - blue
fg = "231" # #ffffff - white
modifiers = ["bold"]

[theme256.table.marked]
bg = "58" # #5f5f00 - olive
fg = "252" # #d0d0d0

[theme256.table.selected]
bg = "26" # #005fd7 - blue
fg = "231" # #ffffff - white
