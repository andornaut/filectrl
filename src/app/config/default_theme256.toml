fg = "44" # #00d7d7 - cyan
modifiers = []

[breadcrumbs.basename]
bg = "26" # #005fd7 - blue
fg = "231" # #ffffff - white
modifiers = ["bold"]

[breadcrumbs.separator]
bg = "234" # #1c1c1c
fg = "240" # #585858 - dim gray
modifiers = []

[file_modified_date.greater_than_year]
