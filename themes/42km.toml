# 42km Theme for FileCtrl
# Inspired by the vscode-42km-theme (Marathon-inspired dark theme)
# UI colors from 42km, file type syntax colors from Solarized Dark

[theme]
bg = "#353a3c"
fg = "#f1f1f1"

[theme.alert]
fg = "#93ada0"

[theme.alert.error]
fg = "#c4071c"

[theme.alert.info]
fg = "#93ada0"

[theme.alert.warn]
fg = "#ff5c00"

[theme.breadcrumbs]
bg = "#c0c8cf"

[theme.breadcrumbs.ancestor]
fg = "#404346"

[theme.breadcrumbs.basename]
bg = "#c0c8cf"
fg = "#353a3c"
modifiers = ["bold"]

[theme.breadcrumbs.separator]
fg = "#728083"

[theme.clipboard.copy]
bg = "#00f080" # Green
fg = "#282a2c"

[theme.clipboard.cut]
bg = "#ff5c00" # Orange
fg = "#282a2c"

[theme.clipboard.delete]
bg = "#c4071c" # Red
fg = "#f1f1f1"

[theme.file_modified_date.less_than_minute]
fg = "#4893c2" # Steel Blue

[theme.file_modified_date.less_than_hour]
fg = "#41a0eb" # Blue

[theme.file_modified_date.less_than_day]
fg = "#00f080" # Green

[theme.file_modified_date.less_than_month]
fg = "#c2fe0b" # Lime

[theme.file_modified_date.less_than_year]
fg = "#ff69b4" # Hot Pink

[theme.file_modified_date.greater_than_year]
fg = "#c4071c" # Red

[theme.file_size.bytes]
fg = "#4893c2" # Steel Blue

[theme.file_size.kib]
fg = "#41a0eb" # Blue

[theme.file_size.mib]
fg = "#00f080" # Green

[theme.file_size.gib]
fg = "#c2fe0b" # Lime

[theme.file_size.tib]
fg = "#ff69b4" # Hot Pink

[theme.file_size.pib]
fg = "#c4071c" # Red

[theme.file_type]
# Whether to apply colors defined in the $LS_COLORS environment variable (if set) on top of colors configured in this section
ls_colors_take_precedence = false

[theme.file_type.block_device]
bg = "#404346"
fg = "#93ada0"
modifiers = ["bold"]

[theme.file_type.character_device]
bg = "#404346"
fg = "#93ada0"
modifiers = ["bold"]

[theme.file_type.directory]
fg = "#41a0eb" # Blue

[theme.file_type.directory_other_writable]
bg = "#282a2c"
fg = "#41a0eb"

[theme.file_type.directory_sticky]
bg = "#41a0eb"
fg = "#f1f1f1"

[theme.file_type.directory_sticky_other_writable]
bg = "#00f080"
fg = "#282a2c"

[theme.file_type.door]
bg = "#404346"
fg = "#ff5c00"
modifiers = ["bold"]

[theme.file_type.executable]
fg = "#00f080"
modifiers = ["bold"]

[theme.file_type.missing]

[theme.file_type.normal_file]
fg = "#c0c8cf"

[theme.file_type.pipe]
bg = "#404346"
fg = "#ff5c00"
modifiers = ["bold"]

[theme.file_type.regular_file]
fg = "#c0c8cf"

[theme.file_type.setgid]
bg = "#ff5c00"
fg = "#282a2c"

[theme.file_type.setuid]
bg = "#c4071c"
fg = "#f1f1f1"

[theme.file_type.socket]
bg = "#404346"
fg = "#ff5c00"
modifiers = ["bold"]

[theme.file_type.symlink]
fg = "#c2fe0b"
modifiers = ["bold"]

[theme.file_type.symlink_broken]
bg = "#282a2c"
fg = "#c4071c"

[theme.help]
fg = "#728083"

[theme.help.header]
bg = "#4893c2"
fg = "#282a2c"

[theme.help.actions]
fg = "#c2fe0b"
modifiers = ["bold"]

[theme.help.shortcuts]
fg = "#f1f1f1"

[theme.prompt.delete]
bg = "#c4071c" # Rust
fg = "#f1f1f1"

[theme.notice.filter]
bg = "#7c48e2"
fg = "#f1f1f1"

[theme.notice.progress]
bg = "#545860"
fg = "#c2fe0b"

[theme.prompt.cursor]
bg = "#c2fe0b"
fg = "#282a2c"

[theme.prompt.input]
bg = "#282a2c"
fg = "#f1f1f1"

[theme.prompt.label]
bg = "#41a0eb"
fg = "#f1f1f1"

[theme.prompt.selected]
bg = "#4030d0"
fg = "#f1f1f1"

[theme.scrollbar]
show_ends = false

[theme.scrollbar.ends]
bg = "#93ada0"
fg = "#282a2c"

[theme.scrollbar.thumb]
bg = "#282a2c"
fg = "#93ada0"

[theme.scrollbar.track]
fg = "#545860"

[theme.status.detail]
bg = "#4893c2"
fg = "#282a2c"

[theme.status.label]
bg = "#545860"
fg = "#f1f1f1"

[theme.table.body]
bg = "#353a3c"
fg = "#f1f1f1"

[theme.table.delete]
bg = "#c4071c"
fg = "#f1f1f1"

[theme.table.header]
bg = "#545860"
fg = "#c0c8cf"

[theme.table.header_sorted]
bg = "#7c48e2"
fg = "#c2fe0b"
modifiers = ["bold"]

[theme.table.marked]
bg = "#7c48e2"
fg = "#f1f1f1"

[theme.table.selected]
bg = "#4030d0"
fg = "#f1f1f1"
